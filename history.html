<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI-WordPeek — Word History</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f3ff;
      min-height: 100vh;
      color: #1a1a2e;
    }

    header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header img {
      width: 36px;
      height: 36px;
      border-radius: 8px;
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    header span {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      margin-left: 4px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-download {
      background: #fff;
      color: #4f46e5;
    }

    .btn-reset {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 20px;
    }

    .search-bar {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      color: #1f2937;
      background: #fff;
      outline: none;
      margin-bottom: 20px;
      transition: border-color 0.15s;
    }

    .search-bar:focus { border-color: #4f46e5; }

    .stats {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 16px;
    }

    .stats strong { color: #4f46e5; }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #9ca3af;
    }

    .empty p { font-size: 15px; margin-top: 8px; }

    .word-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .word-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid #f3f4f6;
      transition: box-shadow 0.15s;
    }

    .word-card:hover { box-shadow: 0 4px 16px rgba(79,70,229,0.10); }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .card-word {
      font-size: 17px;
      font-weight: 700;
      color: #1a1a2e;
      text-transform: capitalize;
    }

    .card-pos {
      font-size: 11px;
      color: #5b21b6;
      background: #ede9fe;
      padding: 2px 8px;
      border-radius: 20px;
      font-style: italic;
    }

    .card-count {
      font-size: 11px;
      color: #9ca3af;
    }

    .card-section {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .badge.en { background: #ede9fe; color: #5b21b6; }
    .badge.ur { background: #fce7f3; color: #9d174d; }

    .card-def {
      font-size: 13px;
      color: #374151;
      line-height: 1.5;
    }

    .card-urdu {
      font-size: 14px;
      direction: rtl;
      text-align: right;
      line-height: 1.8;
      color: #1f2937;
    }

    .card-example {
      font-size: 12px;
      color: #6b7280;
      font-style: italic;
      border-left: 2px solid #e5e7eb;
      padding-left: 8px;
      margin-top: 8px;
      line-height: 1.5;
    }

    .card-date {
      font-size: 11px;
      color: #d1d5db;
      margin-top: 10px;
      text-align: right;
    }

    /* Confirm overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .confirm-box {
      background: #fff;
      border-radius: 12px;
      padding: 28px 28px 20px;
      max-width: 340px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    .confirm-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; color: #1a1a2e; }
    .confirm-box p  { font-size: 13px; color: #6b7280; margin-bottom: 20px; line-height: 1.5; }

    .confirm-actions { display: flex; gap: 10px; justify-content: flex-end; }

    .btn-cancel { background: #f3f4f6; color: #374151; }
    .btn-confirm-reset { background: #ef4444; color: #fff; }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <img src="icon48.png" alt="AI-WordPeek" />
      <div>
        <h1>AI-WordPeek <span>— Word History</span></h1>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-download" id="downloadBtn">⬇ Download CSV</button>
      <button class="btn btn-reset" id="resetBtn">🗑 Reset History</button>
    </div>
  </header>

  <div class="container">
    <input class="search-bar" id="searchInput" type="text" placeholder="Search your words..." />
    <p class="stats" id="stats"></p>
    <div class="word-grid" id="wordGrid"></div>
  </div>

  <!-- Reset confirm overlay -->
  <div class="overlay" id="confirmOverlay" style="display:none;">
    <div class="confirm-box">
      <h3>Reset Word History?</h3>
      <p>This will permanently delete all your saved words. This action cannot be undone.</p>
      <div class="confirm-actions">
        <button class="btn btn-cancel" id="cancelReset">Cancel</button>
        <button class="btn btn-confirm-reset" id="confirmReset">Yes, Reset</button>
      </div>
    </div>
  </div>

  <script src="history.js"></script>
</body>
</html>
